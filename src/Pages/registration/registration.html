<!Doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PØTEPASS | Registrering</title>
    <link rel="stylesheet" href="/src/Pages/registration/registration.css" />
    <script type="module" src="/src/Pages/registration/registration.ts"></script>
    <script type="module" src="/src/main.ts"></script>
  </head>

  <body>
    <div class="page">

      <site-header></site-header>

      <main class="main reg">
        <header class="reg-top" aria-labelledby="reg-title">
          <h1 class="reg-title">REGISTRER DEG</h1>

					<div class="reg-paws" aria-hidden="true">
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
						<img src="/Images/filledpawprint.png" alt="poteavtrykk-ikon" />
					</div>

          <p class="reg-subtitle">Fyll ut registreringsskjema så er du i gang!</p>
        </header>

        <section class="reg-card" aria-label="Registrer deg skjema">
          <h4 class="reg-card-head">Registreringsskjema</h4>

          <div class="reg-card-body">
            <!-- Left -->
            <section class="reg-panel" aria-label="Introduser deg selv">
              <h2 class="reg-panel-title">INTRODUSER DEG SELV:</h2>

              <form class="form" action="#" method="post">
                <div class="form-field">
                  <label class="form-label" for="firstName">Fornavn:</label>
                  <input class="form-control" id="firstName" name="firstName" type="text" />
                </div>

                <div class="form-field">
                  <label class="form-label" for="lastName">Etternavn:</label>
                  <input class="form-control" id="lastName" name="lastName" type="text" />
                </div>

                <div class="form-field">
                  <label class="form-label" for="phone">Telefon:</label>
                  <input class="form-control" id="phone" name="phone" type="tel" />
                </div>

                <div class="form-field">
                  <label class="form-label" for="email">E-post:</label>
                  <input class="form-control" id="email" name="email" type="email" />
                </div>

                <div class="form-field">
                  <label class="form-label" for="pw">Lag passord:</label>
                  <input class="form-control" id="pw" name="pw" type="password" />
                </div>

                <div class="form-field">
                  <label class="form-label" for="pw2">Gjenta passord:</label>
                  <input class="form-control" id="pw2" name="pw2" type="password" />
                </div>

                <div class="reg-upload">
                  <div class="reg-avatar" aria-hidden="true"><img src="/Images/useravatar.png" alt="Profilbilde" /></div>

                  <label class="btn btn-success reg-upload-btn">
                    LAST OPP BILDE
                    <input type="file" hidden />
                  </label>
                </div>
              </form>
            </section>

            <!-- Right -->
            <section class="reg-panel" aria-label="Legg til hund">
              <h2 class="reg-panel-title">LEGG TIL HUND(ER):</h2>

              <form class="form" action="#" method="post">
                <div class="form-field">
                  <label class="form-label" for="dogName">Navn:</label>
                  <input class="form-control" id="dogName" name="dogName" type="text" />
                </div>

                <div class="form-field">
                  <label class="form-label" for="breed">Rase:</label>
                  <input class="form-control" id="breed" name="breed" type="text" />
                </div>

                <div class="form-field">
                  <label class="form-label" for="age">Alder:</label>
                  <input class="form-control" id="age" name="age" type="number" min="0" />
                </div>

                <div class="form-field">
                  <label class="form-label" for="allergies">Allergier:</label>
                  <input class="form-control" id="allergies" name="allergies" type="text" />
                </div>

                <div class="reg-upload">
                  <div class="reg-avatar reg-avatar--dog" aria-hidden="true"><img src="/Images/dogicon.png" alt="Hundens avatar" /></div>

                  <label class="btn btn-success reg-upload-btn">
                    LAST OPP BILDE
                    <input type="file" hidden />
                  </label>
                </div>

                <button class="reg-add-dog" type="button">
                  <span class="reg-plus" aria-hidden="true">+</span>
                  Legg til en hund til
                </button>
              </form>
            </section>
          </div>
					<div class="reg-actions">
 						<button class="btn btn-success reg-submit" type="button">
    					OPPRETT KONTO
  					</button>
					</div>
        </section>
      </main>

      <site-footer></site-footer>

    </div>
  </body>
</html>
