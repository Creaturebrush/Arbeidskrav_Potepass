<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Page</title>
    <link rel="stylesheet" href="/src/Pages/profile/profile.css" />
  </head>

  <body>
    <site-header></site-header>

    <main class="main">
      <h1 class="">PROFIL</h1>
      <img
        src="/images/PawPrint_line.png"
        alt="Bilde av potetrykk"
        class="pawprint-line"
      />

      <section class="user-container">
        <h2>Hei, navn!</h2>
        <div class="info-container">
          <img src="/images/useravatar.png" alt="Profile picture" />
          <div class="user-info">
            <p>Fornavn:</p>
            <p>Etternavn:</p>
            <p>Telefon:</p>
            <p>E-post:</p>
          </div>
        </div>
        <div class="btn-container">
          <button class="btn btn-warning">REDIGER PROFIL</button>
          <button class="btn btn-danger">SLETT PROFIL</button>
        </div>
      </section>

      <section class="dog-container">
        <h2>Mine hunder</h2>
        <div class="dog-card-container">
          <div class="dog-card">
            <div class="dog-card-info">
              <img src="/images/dog1.png" alt="" />
              <div class="dog-info">
                <p>Navn:</p>
                <p>Rase:</p>
                <p>Alder:</p>
                <p>Allergier:</p>
              </div>
            </div>
            <div class="btn-container">
              <button class="btn btn-warning">REDIGER</button>
            </div>
          </div>
          <div class="dog-card">
            <div class="dog-card-info">
              <img src="/images/dog1.png" alt="" />
              <div class="dog-info">
                <p>Navn:</p>
                <p>Rase:</p>
                <p>Alder:</p>
                <p>Allergier:</p>
              </div>
            </div>
            <div class="btn-container">
              <button class="btn btn-warning">REDIGER</button>
            </div>
          </div>
        </div>
        <div class="btn-container">
          <button class="btn btn-success">LEGG TIL HUND</button>
          <button class="btn btn-danger">FJERN HUND</button>
        </div>
      </section>

      <section class="booking-request-section">
        <div class="btn-container">
          <button class="btn">MINE BOOKINGER</button>
          <button class="btn">MINE FORESPØRSELER</button>
        </div>
      </section>

      <div class="p-modal">
        <h2>LEGG TIL HUND</h2>
        <div class="add-dog-modal">
        <div class="image-container">
          <img src="/public/images/dogicon.png" alt="">
          <button class="btn btn-success">LAST OPP BILDE</button>
        </div>
        <div class="dog-info">
                <p>Navn:</p>
                <p>Rase:</p>
                <p>Alder:</p>
                <p>Allergier:</p>
          </div>
          <div class="btn-container">
              <button class="btn btn-warning">REDIGER</button>
              <button class="btn btn-warning">REDIGER</button>
              <button class="btn btn-warning">REDIGER</button>
              <button class="btn btn-warning">REDIGER</button>
            </div>
            </div>
      </div>
    </main>

    <site-footer></site-footer>
    <script type="module" src="/src/Pages/profile/profile.ts"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
