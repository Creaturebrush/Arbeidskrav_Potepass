<!Doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hundepassere</title>
    <link rel="stylesheet" href="/src/Pages/sitters/become-a-sitter/become-a-sitter.css" />
    <link rel="stylesheet" href="/src/style.css">
    <meta name="author" content="Stine Hartvigsen">
  </head>
  
  
  <body>
    <div class="page">
      <main class="main header-page">
        <header class="header-top">
          <h1 class="header-title">BLI HUNDEPASSER</h1>   
            <div class="header-paws">
              <img src="/images/PawPrint_line.png" alt=""/>
            </div>
            <h3>Så flott at du ønsker å bli hundepasser!</h3>
            <p>Fyll ut registreingsskjema så er du i gang</p>
        </header>
        <!--FORM-->

        <div class="sitter-form-container">
          <form action="">
            <div class="Sitter-form-title">
              <h3>BLI HUNDEPASSER</h3>
            </div>

            <div class="sitters-input-form">
         
              <label for="name">FORNAVN</label>
              <input type="text" name="name" placeholder="frank" required /> 
              <label for="name">ETTERNAVN</label>
              <input type="text" name="last-name">
              <label class="" for="textarea">INTRODUSER DEG SELV</label>
              <textarea
                type="textarea" 
                class=""
                rows="10" 
                placeholder="Introduser deg selv. F.eks. kan du fortelle hvor lenge du har vært hundepasser og hvilken erfaring du har.">
              </textarea>
              <div>
                <label class="sitter-experience" for="">ÅRS ERFARING</label>
                <input class="sitter-experience-input" id="sitterExperience" type="number" min="0" placeholder="0" />
              </div>
              <div>
                <label class="sitter-experience" for="">PRICE</label>
                <input class="sitter-experience-input" id="sitterExperience" type="number" min="0" step="50" placeholder="0" />
              </div>
              <div>
                <label class="sitter-experience" for="">MAX ANTALL HUNDER</label>
                <input class="sitter-experience-input" id="sitterExperience" type="number" min="0" placeholder="0" />
              </div>
               <!-- boks alternativer-->
              <div>
                <label class="sitter-experience" for="">VALPER</label>
                <input class="sitter-experience-input" id="sitterExperience" type="number" min="0"  placeholder="0" />
              </div>
              
              <div>
                <label class="sitter-experience" for="">ERFARING MED HUNDER</label>
                <input class="sitter-experience-input" id="sitterExperience" type="number" min="0" step="10" placeholder="0" />
              </div>



              <div class="sitter-availability">
                <label for="">TILGJENGELIGHET</label>
                <label class="sitter-availability-label" for="dateFrom">Fra</label>
                <input class="sitter-availability-input" id="dateFrom" type="date" />

                <label class="sitter-availability-label" for="dateTo">Til</label>
                <input class="sitter-availability-input" id="dateTo" type="date" />
              </div>
              <div class="sitter-availability">
                <label class="sitter-availability-label" for="dateFrom">Fra</label>
                <input class="sitter-availability-input" id="dateFrom" type="date" />

                <label class="sitter-availability-label" for="dateTo">Til</label>
                <input class="sitter-availability-input" id="dateTo" type="date" />
              </div>

              <div class="become-sitter-buttons">
                <button class=" btn btn-danger cancel-btn"> </button>
                <button class="btn btn-success accept-btn"></button>
              </div>

              
             </div> 
      

          </form>
        </div>
      </main>
    </div>
    <script></script>
  </body>
